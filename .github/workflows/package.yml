name: Build Installable Plugin ZIP

on:
  push:
    branches: [ master ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP with WordPress.org plugin slug
        run: scripts/build-zip.sh

      - name: Upload installable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: alpha-google-map-for-elementor
          path: build/alpha-google-map-for-elementor.zip

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" build/alpha-google-map-for-elementor.zip --clobber
